<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Bootstrap 5 + Choices.js Example</title>

  <!-- Bootstrap 5 CSS  Choices.js -->
  <!-- <link href='./css/choices.js-bootstrap.css' rel='stylesheet'> -->
  <link href='./css/choices.js-bootstrap.min.css' rel='stylesheet'>

  <style>
    [data-label-class='search-hint'] {
      display: none;
    }
  </style>
</head>
<body>
  <div class='container mt-5'>
    <h1>Bootstrap 5 + Choices.js Example</h1>
  </div>

  <div class='container my-5 bg-body-secondary bg-gradient py-3 rounded'>
    <h2>Normal select (no remote data fetching)</h2>
    <div class='row mt-4'>
      <div class='col'>
        <label for='select-pet-normal1'>Choose a pet:</label>

        <select name='select-pet-normal1' id='select-pet-normal1' class='d-none' data-placeholder='Choose a pet...'>
          <option value='dog'>Dog</option>
          <option value='cat'>Cat</option>
          <option value='hamster'>Hamster</option>
          <option value='parrot'>Parrot</option>
          <option value='spider'>Spider</option>
          <option value='goldfish'>Goldfish</option>
          <option value='vulture'>Vulture</option>
          <option value='snake'>Snake</option>
          <option value='lizard'>Lizard</option>
          <option value='turtle'>Turtle</option>
        </select>
      </div>
      <div class='col'>
        <label for='select-pet-normal2'>Choose a pet:</label>

        <select name='select-pet-normal2' id='select-pet-normal2' class='d-none' data-placeholder='Choose a pet...'>
          <optgroup label='Fruit'>
            <option value='apple'>Apples</option>
            <option value='banana'>Bananas</option>
            <option value='cherry'>Cherries</option>
            <option value='damson'>Damsons</option>
          </optgroup>
          <hr />
          <optgroup label='Vegetables'>
            <option value='artichoke'>Artichokes</option>
            <option value='broccoli'>Broccoli</option>
            <option value='cabbage'>Cabbages</option>
          </optgroup>
          <hr />
          <optgroup label='Meat'>
            <option value='beef'>Beef</option>
            <option value='chicken'>Chicken</option>
            <option value='pork'>Pork</option>
          </optgroup>
          <hr />
          <optgroup label='Fish'>
            <option value='cod'>Cod</option>
            <option value='haddock'>Haddock</option>
            <option value='salmon'>Salmon</option>
            <option value='turbot'>Turbot</option>
          </optgroup>
        </select>
      </div>
    </div>

    <div class='row mt-4'>
      <div class='col'>
        <label for='select-pet-normal3'>Your favorite pets:</label>
        <select name='select-pet-normal3' id='select-pet-normal3' class='d-none' multiple
          data-placeholder='Choose pets...' data-choices-target='select'>
          <option value='dog'>Dog</option>
          <option value='cat'>Cat</option>
          <option value='hamster'>Hamster</option>
          <option value='parrot'>Parrot</option>
          <option value='spider'>Spider</option>
          <option value='goldfish'>Goldfish</option>
          <option value='horse'>Horse</option>
          <option value='rabbit'>Rabbit</option>
          <option value='turtle'>Turtle</option>
          <option value='snake'>Snake</option>
          <option value='lizard'>Lizard</option>
          <option value='frog'>Frog</option>
        </select>
      </div>
    </div>
    
    <hr class='mt-5'>
    <h2>Using config</h2>
    <div class='row mt-4'>
      <div class='col'>
        <label for='my-select'>Choose a pet:</label>

        <select name='select-pet' id='select-pet1' class='d-none' data-placeholder='Choose a pet...'>
        </select>
      </div>
      <div class='col'>
        <label for='my-select'>Choose a pet:</label>

        <select name='select-pet' id='select-pet2' class='d-none' data-placeholder='Choose a pet...'>
        </select>
      </div>
    </div>
    <div class='row mt-4'>
      <div class='col'>
        <label for='my-select'>Choose a pet:</label>

        <select name='select-pet' id='select-pet3' class='d-none' data-placeholder='Choose a pet...'>
        </select>
      </div>
      <div class='col'>
        <label for='my-select'>Choose a pet:</label>

        <select name='select-pet' id='select-pet4' class='d-none' data-placeholder='Choose a pet...'>
        </select>
      </div>
    </div>

    <hr class='mt-5'>
    <h2>Cascading select</h2>
    <div class='row mt-4'>
      <div class='col'>
        <label for='my-select'>Choose a pet:</label>

        <select name='select-pet' id='select-pet5' class='d-none' data-placeholder='Choose a pet...'>
        </select>
      </div>
      <div class='col'>
        <label for='select-hobby'>Pet's hobby:</label>

        <select name='select-hobby' id='select-hobby' class='d-none' data-placeholder='Choose a hobby...'>
        </select>
      </div>
    </div>
  </div>

<!-- Choices.js JS -->
<script src='https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js'></script>
<!-- <script src='./js/choices.js'></script> -->

<script src='./js/choices-remote-data.js'></script>
<script type='importmap'>
  {
    "imports": {
      "http-request-mock": "https://cdn.jsdelivr.net/npm/http-request-mock@2.0.2/+esm"
    }
  }
</script>

<script type='module' src='./js/app.mjs'></script>

</body>
</html>
